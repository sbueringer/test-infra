presubmits:
  kubernetes-sigs/kubespray:
  - name: pull-kubespray-yamllint
    cluster: eks-prow-build-cluster
    annotations:
      testgrid-dashboards: sig-cluster-lifecycle-kubespray
      testgrid-tab-name: yamllint
    always_run: true
    skip_report: false
    decorate: true
    spec:
      containers:
      - image: quay.io/kubespray/kubespray:v2.13.0
        args:
        - yamllint
        - "--strict"
        - .
        resources:
          limits:
            cpu: 1
            memory: 4Gi
          requests:
            cpu: 1
            memory: 4Gi
  - name: pull-kubespray-kubevirt-image-builder-validate
    cluster: eks-prow-build-cluster
    annotations:
      testgrid-dashboards: sig-cluster-lifecycle-kubespray
      testgrid-tab-name: kubevirt-image-builder-validate
    run_if_changed: '^test-infra/image-builder/.*'
    always_run: false
    skip_report: false
    decorate: true
    spec:
      containers:
      - image: us-central1-docker.pkg.dev/k8s-staging-test-infra/images/kubekins-e2e:v20260316-e86cefa561-master
        command:
        - runner.sh
        args:
        - bash
        - -ceu
        - |
          apt-get update
          apt-get install -y --no-install-recommends qemu-utils uidmap fuse-overlayfs rootlesskit ca-certificates curl
          python3 -m pip install --no-cache-dir --break-system-packages ansible-core
          ansible-galaxy collection install community.general
          buildkit_arch="$(dpkg --print-architecture)"
          curl -fsSL "https://github.com/moby/buildkit/releases/download/v0.25.1/buildkit-v0.25.1.linux-${buildkit_arch}.tar.gz" -o /tmp/buildkit.tgz
          tar -C /usr/local -xzf /tmp/buildkit.tgz
          curl -fsSL "https://raw.githubusercontent.com/moby/buildkit/v0.25.1/examples/buildctl-daemonless/buildctl-daemonless.sh" -o /usr/local/bin/buildctl-daemonless.sh
          chmod +x /usr/local/bin/buildctl-daemonless.sh
          make -C test-infra/image-builder validate-single image_name=ubuntu-2404
        resources:
          limits:
            cpu: 1
            memory: 4Gi
          requests:
            cpu: 1
            memory: 4Gi
